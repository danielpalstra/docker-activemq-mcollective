main_collective = mcollective
collectives = mcollective

libdir = /opt/puppetlabs/mcollective/plugins

# consult the "classic" libdirs too
libdir = /usr/share/mcollective/plugins
libdir = /usr/libexec/mcollective

# Log to the console (usefull for testing with containers)
logger_type = console
loglevel = debug

# logfile = /var/log/puppetlabs/mcollective/mcollective.log
# loglevel = info
# daemonize = 1

# Plugins
securityprovider = psk
plugin.psk = unset

connector = activemq

# Configure the connection pool
plugin.activemq.randomize = true
plugin.activemq.pool.size = 1
# Connect to one of the slave nodes
plugin.activemq.pool.1.host = slave
plugin.activemq.pool.1.port = 61613
plugin.activemq.pool.1.user = mcollective
plugin.activemq.pool.1.password = marionette
plugin.activemq.pool.1.ssl = true
plugin.activemq.pool.1.ssl.ca = /etc/puppetlabs/mcollective/ssl/ca.cert.pem
plugin.activemq.pool.1.ssl.cert = /etc/puppetlabs/mcollective/ssl/zs94a-7b6401.k94.kvk.nl.cert.pem
plugin.activemq.pool.1.ssl.key = /etc/puppetlabs/mcollective/ssl/zs94a-7b6401.k94.kvk.nl.private_key.pem
# plugin.activemq.pool.1.ssl.cert = /etc/puppetlabs/mcollective/ssl/mcollective-public.pem
# plugin.activemq.pool.1.ssl.key = /etc/puppetlabs/mcollective/ssl/mcollective-private.pem

# Security plugin settings (required):
# -----------------------------------
# securityprovider           = ssl

# # SSL plugin settings:
# plugin.ssl_server_private  = /etc/puppetlabs/mcollective/ssl/mcollective-private.pem
# plugin.ssl_server_public   = /etc/puppetlabs/mcollective/ssl/mcollective-public.pem
# plugin.ssl_client_cert_dir = /etc/puppetlabs/mcollective/ssl/clients
# plugin.ssl_serializer      = yaml


# Facts
factsource = yaml
plugin.yaml = /etc/puppetlabs/mcollective/facts.yaml
