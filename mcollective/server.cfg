main_collective = mcollective
collectives = mcollective

libdir = /opt/puppetlabs/mcollective/plugins

# consult the "classic" libdirs too
libdir = /usr/share/mcollective/plugins
libdir = /usr/libexec/mcollective

logger_type = console
loglevel = debug

# logfile = /var/log/puppetlabs/mcollective/mcollective.log
# loglevel = info
# daemonize = 1

# Plugins
securityprovider = psk
plugin.psk = unset

connector = activemq

# Configure the connection pool
plugin.activemq.randomize = true
plugin.activemq.pool.size = 2
# Set hostname to the container name of activemq
plugin.activemq.pool.1.host = master
plugin.activemq.pool.1.port = 61613
plugin.activemq.pool.1.user = mcollective
plugin.activemq.pool.1.password = marionette
plugin.activemq.pool.2.host = slave
plugin.activemq.pool.2.port = 61613
plugin.activemq.pool.2.user = mcollective
plugin.activemq.pool.2.password = marionette

# Facts
factsource = yaml
plugin.yaml = /etc/puppetlabs/mcollective/facts.yaml
